<?xml version="1.0" encoding="UTF-8"?>
<!-- Dot grid — CSS background-image approach recreated as SVG pattern -->
<!-- Tile this at 20x20px units. Use on dark (#151515) backgrounds. -->
<!-- Color: rgba(233,235,223,0.12) = off-white dots on dark -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20">
  <circle cx="1" cy="1" r="1" fill="rgba(233,235,223,0.12)"/>
</svg>
