<?xml version="1.0" encoding="UTF-8"?>
<!-- SOURCE: retool.com homepage hero — gradient glowing lines with radial mask fade -->
<!-- Usage: position:absolute; fill="currentColor" (or specific blue color) -->
<!-- Note: var(--raw-blue-primary) = #518DD2, var(--raw-blue-lightest) = #9CBFE7 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 159" preserveAspectRatio="none" vector-effect="non-scaling-stroke" fill="currentColor">
  <defs>
    <!-- The horizontal lines, used as a mask shape -->
    <mask id="single-array-down-mask">
      <g stroke="#FFFFFF" stroke-width="1">
        <line y1="158" x2="1360" y2="158"/>
        <line y1="106" x2="1360" y2="106"/>
        <line y1="68"  x2="1360" y2="68"/>
        <line y1="41"  x2="1360" y2="41"/>
        <line y1="21"  x2="1360" y2="21"/>
        <line y1="4"   x2="1360" y2="4"/>
      </g>
    </mask>
    <!-- Diagonal sweeping gradient — repeating blue/light bands -->
    <linearGradient id="single-array-gradient-1"
      gradientTransform="rotate(20, 0.5, 0.5) scale(3)"
      gradientUnits="objectBoundingBox"
      x1="-32.6625%" x2="67.3375%">
      <stop offset="0%"   stop-color="#518DD2" stop-opacity="0.1"/>
      <stop offset="8%"   stop-color="#518DD2" stop-opacity="0.9"/>
      <stop offset="12%"  stop-color="#518DD2"/>
      <stop offset="15%"  stop-color="#9CBFE7"/>
      <stop offset="21%"  stop-color="#9CBFE7" stop-opacity="0.9"/>
      <stop offset="24%"  stop-color="#9CBFE7" stop-opacity="0.1"/>
      <stop offset="26%"  stop-color="#518DD2" stop-opacity="0.1"/>
      <stop offset="33%"  stop-color="#518DD2" stop-opacity="0.9"/>
      <stop offset="38%"  stop-color="#518DD2"/>
      <stop offset="40%"  stop-color="#9CBFE7"/>
      <stop offset="44%"  stop-color="#9CBFE7" stop-opacity="0.9"/>
      <stop offset="49%"  stop-color="#9CBFE7" stop-opacity="0.1"/>
      <stop offset="51%"  stop-color="#518DD2" stop-opacity="0.1"/>
      <stop offset="58%"  stop-color="#518DD2" stop-opacity="0.9"/>
      <stop offset="62%"  stop-color="#518DD2"/>
      <stop offset="65%"  stop-color="#9CBFE7"/>
      <stop offset="69%"  stop-color="#9CBFE7" stop-opacity="0.9"/>
      <stop offset="74%"  stop-color="#9CBFE7" stop-opacity="0.1"/>
      <stop offset="76%"  stop-color="#518DD2" stop-opacity="0.1"/>
      <stop offset="83%"  stop-color="#518DD2" stop-opacity="0.9"/>
      <stop offset="88%"  stop-color="#518DD2"/>
      <stop offset="90%"  stop-color="#9CBFE7"/>
      <stop offset="94%"  stop-color="#9CBFE7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#9CBFE7" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Radial fade — makes lines vanish at edges -->
    <radialGradient id="radial-gradient-mask" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="1"/>
      <stop offset="50%"  stop-color="white" stop-opacity="1"/>
      <stop offset="70%"  stop-color="white" stop-opacity="0.4"/>
      <stop offset="90%"  stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="radial-mask">
      <g class="transition-opacity duration-800" opacity="1">
        <rect width="900"  height="900"  opacity="1" x="-400" y="-400" fill="url(#radial-gradient-mask)"/>
        <rect width="1100" height="1100" opacity="1" x="130"  y="-400" fill="url(#radial-gradient-mask)"/>
        <rect width="900"  height="900"  opacity="1" x="860"  y="-400" fill="url(#radial-gradient-mask)"/>
      </g>
    </mask>
  </defs>
  <!-- Base: plain lines in current color (very subtle) -->
  <rect x="-1" y="0" width="1362" height="160"
        mask="url(#single-array-down-mask)"
        fill="currentColor"/>
  <!-- Overlay: gradient-colored glow through the same line mask -->
  <g mask="url(#radial-mask)">
    <rect x="0" y="0" width="1362" height="160"
          mask="url(#single-array-down-mask)"
          fill="url(#single-array-gradient-1)"/>
  </g>
</svg>
